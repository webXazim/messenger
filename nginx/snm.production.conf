include /etc/nginx/snippets/cloudflare-real-ip.conf;
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    server_tokens off;

    # Kept available for future ACME clients. Cloudflare Origin CA deployments
    # normally place certificates in secrets/tls instead.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/acme;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    server_tokens off;
    client_max_body_size 120M;

    ssl_certificate /etc/nginx/tls/origin.crt;
    ssl_certificate_key /etc/nginx/tls/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:TLS:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    include /etc/nginx/snippets/app/security-headers.conf;

    resolver 127.0.0.11 ipv6=off valid=30s;
    set $django_upstream http://web:8000;
    set $frontend_upstream http://frontend:80;
    set $realtime_upstream http://realtime:9000;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Request-ID $request_id;

    location /api/ {
        proxy_pass $django_upstream;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
        proxy_connect_timeout 15;
        proxy_buffering off;
        add_header Cache-Control "no-store" always;
        include /etc/nginx/snippets/app/security-headers.conf;
    }

    location = /internal/admin-monitoring {
        proxy_pass $django_upstream;
        proxy_read_timeout 30;
        proxy_send_timeout 30;
        add_header Cache-Control "no-store" always;
        include /etc/nginx/snippets/app/security-headers.conf;
    }

    location = /admin-gateway-entry/ {
        proxy_pass $django_upstream;
        add_header Cache-Control "no-store" always;
        include /etc/nginx/snippets/app/security-headers.conf;
    }

    location /admin/ {
        proxy_pass $django_upstream;
        add_header Cache-Control "no-store" always;
        include /etc/nginx/snippets/app/security-headers.conf;
    }

    location /static/assets/ {
        proxy_pass $frontend_upstream;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        include /etc/nginx/snippets/app/security-headers.conf;
    }

    location /static/ {
        proxy_pass $django_upstream;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        include /etc/nginx/snippets/app/security-headers.conf;
    }

    location = /ws {
        # Preserve the original /ws URI and its short-lived ticket query
        # parameter exactly. Adding a URI to a variable proxy_pass can replace
        # request components and make WebSocket authentication intermittent.
        proxy_pass $realtime_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
        proxy_connect_timeout 15;
        proxy_buffering off;
        access_log off;
        proxy_cache_bypass $http_upgrade;
    }

    location ^~ /ws/ {
        return 404;
    }

    # Public local media only. Private chat files stay in R2 and use the
    # authenticated media endpoint / short-lived signed URLs.
    location /media/ {
        alias /app/media/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        include /etc/nginx/snippets/app/security-headers.conf;
    }

    location / {
        proxy_pass $frontend_upstream;
        proxy_read_timeout 60;
        proxy_send_timeout 60;
        add_header Cache-Control "no-cache" always;
        include /etc/nginx/snippets/app/security-headers.conf;
    }
}
