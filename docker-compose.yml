name: cs-messenger

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-backend-common: &backend-common
  build: .
  restart: unless-stopped
  init: true
  stop_grace_period: 30s
  logging: *default-logging
  env_file:
    - path: .env
      required: false
  environment:
    DB_ENGINE: ${DB_ENGINE:-postgres}
    DB_NAME: ${DB_NAME:-messenger_api}
    DB_USER: ${DB_USER:-messenger_user}
    DB_PASSWORD: ${DB_PASSWORD:-messenger_password}
    DB_HOST: postgres
    DB_PORT: 5432
    REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
    REDIS_CACHE_URL: ${REDIS_CACHE_URL:-redis://redis:6379/2}
    CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
    CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    REALTIME_STREAM_URL: ${REALTIME_STREAM_URL:-redis://redis:6379/3}
    REALTIME_STREAM_NAME: ${REALTIME_STREAM_NAME:-realtime:durable:v1}
    REALTIME_PRESENCE_REDIS_URL: ${REALTIME_PRESENCE_REDIS_URL:-redis://redis:6379/3}
    REALTIME_PRESENCE_TTL_SECONDS: ${REALTIME_PRESENCE_TTL_SECONDS:-90}
    REALTIME_PRESENCE_METADATA_TTL_SECONDS: ${REALTIME_PRESENCE_METADATA_TTL_SECONDS:-300}
    REALTIME_STREAM_ENABLED: ${REALTIME_STREAM_ENABLED:-true}
    REALTIME_OUTBOX_ENABLED: ${REALTIME_OUTBOX_ENABLED:-true}
    REALTIME_TRANSPORT: ${REALTIME_TRANSPORT:-axum}
    REALTIME_AUTH_ENABLED: ${REALTIME_AUTH_ENABLED:-true}
    REALTIME_TOKEN_ALGORITHM: RS256
    REALTIME_TOKEN_ISSUER: ${REALTIME_TOKEN_ISSUER:-crescentsphere-django}
    REALTIME_TICKET_AUDIENCE: ${REALTIME_TICKET_AUDIENCE:-crescentsphere-realtime}
    REALTIME_GRANT_AUDIENCE: ${REALTIME_GRANT_AUDIENCE:-crescentsphere-realtime-grant}
    REALTIME_CALL_GRANT_AUDIENCE: ${REALTIME_CALL_GRANT_AUDIENCE:-crescentsphere-realtime-call-grant}
    REALTIME_TICKET_TTL_SECONDS: ${REALTIME_TICKET_TTL_SECONDS:-45}
    REALTIME_GRANT_TTL_SECONDS: ${REALTIME_GRANT_TTL_SECONDS:-90}
    REALTIME_CALL_GRANT_TTL_SECONDS: ${REALTIME_CALL_GRANT_TTL_SECONDS:-90}
    REALTIME_REQUIRE_ORIGIN: ${REALTIME_REQUIRE_ORIGIN:-true}
    REALTIME_ALLOWED_ORIGINS: ${REALTIME_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
    REALTIME_SIGNING_PRIVATE_KEY_PATH: /run/secrets/realtime-private.pem
    REALTIME_SIGNING_PUBLIC_KEY_PATH: /run/secrets/realtime-public.pem
    ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web,nginx}
    CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
    CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
    FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:8080}
    SITE_URL: ${SITE_URL:-http://localhost:8080}
    SUPPORT_CHAT_ENABLED: ${SUPPORT_CHAT_ENABLED:-true}
    SUPPORT_CHAT_PRODUCT_CODE: ${SUPPORT_CHAT_PRODUCT_CODE:-support-chat}
    SUPPORT_WIDGET_ENABLED: ${SUPPORT_WIDGET_ENABLED:-true}
    SUPPORT_WIDGET_REQUIRE_ORIGIN: ${SUPPORT_WIDGET_REQUIRE_ORIGIN:-true}
    SUPPORT_CALLS_ENABLED: ${SUPPORT_CALLS_ENABLED:-true}
  volumes:
    - private_media:/app/private_media
    - media:/app/media
    - ./secrets:/run/secrets:ro
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    init: true
    stop_grace_period: 30s
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    command:
      - postgres
      - -c
      - max_connections=40
      - -c
      - shared_buffers=128MB
      - -c
      - work_mem=2MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - idle_in_transaction_session_timeout=60s
      - -c
      - log_min_duration_statement=500
    mem_limit: 384m
    cpus: 1.25
    pids_limit: 128
    environment:
      POSTGRES_DB: ${DB_NAME:-messenger_api}
      POSTGRES_USER: ${DB_USER:-messenger_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-messenger_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-messenger_user} -d ${DB_NAME:-messenger_api}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [messenger]

  redis:
    init: true
    stop_grace_period: 30s
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command: redis-server --appendonly yes --appendfsync everysec --save 60 1000 --maxmemory 160mb --maxmemory-policy noeviction --latency-monitor-threshold 100 --slowlog-log-slower-than 10000 --slowlog-max-len 128
    mem_limit: 192m
    cpus: 0.75
    pids_limit: 96
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [messenger]

  web:
    <<: *backend-common
    ulimits:
      nofile:
        soft: 4096
        hard: 4096
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-2} --threads ${GUNICORN_THREADS:-2} --timeout 30 --keep-alive 5 --max-requests ${GUNICORN_MAX_REQUESTS:-1000} --max-requests-jitter ${GUNICORN_MAX_REQUESTS_JITTER:-100}
    environment:
      DB_ENGINE: ${DB_ENGINE:-postgres}
      DB_NAME: ${DB_NAME:-messenger_api}
      DB_USER: ${DB_USER:-messenger_user}
      DB_PASSWORD: ${DB_PASSWORD:-messenger_password}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      REDIS_CACHE_URL: ${REDIS_CACHE_URL:-redis://redis:6379/2}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      REALTIME_STREAM_URL: ${REALTIME_STREAM_URL:-redis://redis:6379/3}
      REALTIME_STREAM_NAME: ${REALTIME_STREAM_NAME:-realtime:durable:v1}
      REALTIME_STREAM_GROUP: ${REALTIME_STREAM_GROUP:-axum-single-v1}
      REALTIME_OUTBOX_MAX_AGE_SECONDS: ${REALTIME_OUTBOX_MAX_AGE_SECONDS:-120}
      REALTIME_OUTBOX_MAX_FAILED: ${REALTIME_OUTBOX_MAX_FAILED:-25}
      REALTIME_STREAM_MAX_PENDING: ${REALTIME_STREAM_MAX_PENDING:-250}
      REALTIME_PRESENCE_REDIS_URL: ${REALTIME_PRESENCE_REDIS_URL:-redis://redis:6379/3}
      REALTIME_PRESENCE_TTL_SECONDS: ${REALTIME_PRESENCE_TTL_SECONDS:-90}
      REALTIME_PRESENCE_METADATA_TTL_SECONDS: ${REALTIME_PRESENCE_METADATA_TTL_SECONDS:-300}
      REALTIME_STREAM_ENABLED: ${REALTIME_STREAM_ENABLED:-true}
      REALTIME_OUTBOX_ENABLED: ${REALTIME_OUTBOX_ENABLED:-true}
      REALTIME_TRANSPORT: ${REALTIME_TRANSPORT:-axum}
      REALTIME_AUTH_ENABLED: ${REALTIME_AUTH_ENABLED:-true}
      REALTIME_TOKEN_ALGORITHM: RS256
      REALTIME_TOKEN_ISSUER: ${REALTIME_TOKEN_ISSUER:-crescentsphere-django}
      REALTIME_TICKET_AUDIENCE: ${REALTIME_TICKET_AUDIENCE:-crescentsphere-realtime}
      REALTIME_GRANT_AUDIENCE: ${REALTIME_GRANT_AUDIENCE:-crescentsphere-realtime-grant}
      REALTIME_CALL_GRANT_AUDIENCE: ${REALTIME_CALL_GRANT_AUDIENCE:-crescentsphere-realtime-call-grant}
      REALTIME_TICKET_TTL_SECONDS: ${REALTIME_TICKET_TTL_SECONDS:-45}
      REALTIME_GRANT_TTL_SECONDS: ${REALTIME_GRANT_TTL_SECONDS:-90}
      REALTIME_CALL_GRANT_TTL_SECONDS: ${REALTIME_CALL_GRANT_TTL_SECONDS:-90}
      REALTIME_REQUIRE_ORIGIN: ${REALTIME_REQUIRE_ORIGIN:-true}
      REALTIME_ALLOWED_ORIGINS: ${REALTIME_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      REALTIME_SIGNING_PRIVATE_KEY_PATH: /run/secrets/realtime-private.pem
      REALTIME_SIGNING_PUBLIC_KEY_PATH: /run/secrets/realtime-public.pem
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web,nginx}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:8080}
      SITE_URL: ${SITE_URL:-http://localhost:8080}
      BACKUP_R2_BUCKET_NAME: ${BACKUP_R2_BUCKET_NAME:-}
      BACKUP_R2_PREFIX: ${BACKUP_R2_PREFIX:-system-backups}
      BACKUP_R2_RETENTION_DAYS: ${BACKUP_R2_RETENTION_DAYS:-30}
      BACKUP_R2_KEEP_LATEST: ${BACKUP_R2_KEEP_LATEST:-7}
      BACKUP_MAX_UPLOAD_BYTES: ${BACKUP_MAX_UPLOAD_BYTES:-2147483648}
      SUPPORT_CHAT_ENABLED: ${SUPPORT_CHAT_ENABLED:-true}
      SUPPORT_CHAT_PRODUCT_CODE: ${SUPPORT_CHAT_PRODUCT_CODE:-support-chat}
      SUPPORT_WIDGET_ENABLED: ${SUPPORT_WIDGET_ENABLED:-true}
      SUPPORT_WIDGET_REQUIRE_ORIGIN: ${SUPPORT_WIDGET_REQUIRE_ORIGIN:-true}
      SUPPORT_CALLS_ENABLED: ${SUPPORT_CALLS_ENABLED:-true}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-1}
      RUN_COLLECTSTATIC: "1"
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - -H
        - "Host: ${APP_DOMAIN:-localhost}"
        - -H
        - "X-Forwarded-Proto: https"
        - http://127.0.0.1:8000/api/v1/health/live/
      interval: 20s
      timeout: 8s
      retries: 10
      start_period: 30s
    mem_limit: 320m
    cpus: 1.0
    pids_limit: 160
    networks: [messenger]

  worker:
    <<: *backend-common
    command: celery -A config worker -l ${CELERY_LOG_LEVEL:-INFO} --concurrency=${CELERY_WORKER_CONCURRENCY:-1} --prefetch-multiplier=${CELERY_WORKER_PREFETCH_MULTIPLIER:-1} --max-tasks-per-child=${CELERY_WORKER_MAX_TASKS_PER_CHILD:-500}
    environment:
      DB_ENGINE: ${DB_ENGINE:-postgres}
      DB_NAME: ${DB_NAME:-messenger_api}
      DB_USER: ${DB_USER:-messenger_user}
      DB_PASSWORD: ${DB_PASSWORD:-messenger_password}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      REDIS_CACHE_URL: ${REDIS_CACHE_URL:-redis://redis:6379/2}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      REALTIME_STREAM_URL: ${REALTIME_STREAM_URL:-redis://redis:6379/3}
      REALTIME_STREAM_NAME: ${REALTIME_STREAM_NAME:-realtime:durable:v1}
      REALTIME_STREAM_GROUP: ${REALTIME_STREAM_GROUP:-axum-single-v1}
      REALTIME_OUTBOX_MAX_AGE_SECONDS: ${REALTIME_OUTBOX_MAX_AGE_SECONDS:-120}
      REALTIME_OUTBOX_MAX_FAILED: ${REALTIME_OUTBOX_MAX_FAILED:-25}
      REALTIME_STREAM_MAX_PENDING: ${REALTIME_STREAM_MAX_PENDING:-250}
      REALTIME_PRESENCE_REDIS_URL: ${REALTIME_PRESENCE_REDIS_URL:-redis://redis:6379/3}
      REALTIME_PRESENCE_TTL_SECONDS: ${REALTIME_PRESENCE_TTL_SECONDS:-90}
      REALTIME_PRESENCE_METADATA_TTL_SECONDS: ${REALTIME_PRESENCE_METADATA_TTL_SECONDS:-300}
      REALTIME_STREAM_ENABLED: ${REALTIME_STREAM_ENABLED:-true}
      REALTIME_OUTBOX_ENABLED: ${REALTIME_OUTBOX_ENABLED:-true}
      REALTIME_TRANSPORT: ${REALTIME_TRANSPORT:-axum}
      REALTIME_AUTH_ENABLED: ${REALTIME_AUTH_ENABLED:-true}
      REALTIME_TOKEN_ALGORITHM: RS256
      REALTIME_TOKEN_ISSUER: ${REALTIME_TOKEN_ISSUER:-crescentsphere-django}
      REALTIME_TICKET_AUDIENCE: ${REALTIME_TICKET_AUDIENCE:-crescentsphere-realtime}
      REALTIME_GRANT_AUDIENCE: ${REALTIME_GRANT_AUDIENCE:-crescentsphere-realtime-grant}
      REALTIME_CALL_GRANT_AUDIENCE: ${REALTIME_CALL_GRANT_AUDIENCE:-crescentsphere-realtime-call-grant}
      REALTIME_TICKET_TTL_SECONDS: ${REALTIME_TICKET_TTL_SECONDS:-45}
      REALTIME_GRANT_TTL_SECONDS: ${REALTIME_GRANT_TTL_SECONDS:-90}
      REALTIME_CALL_GRANT_TTL_SECONDS: ${REALTIME_CALL_GRANT_TTL_SECONDS:-90}
      REALTIME_REQUIRE_ORIGIN: ${REALTIME_REQUIRE_ORIGIN:-true}
      REALTIME_ALLOWED_ORIGINS: ${REALTIME_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      REALTIME_SIGNING_PRIVATE_KEY_PATH: /run/secrets/realtime-private.pem
      REALTIME_SIGNING_PUBLIC_KEY_PATH: /run/secrets/realtime-public.pem
      SUPPORT_CHAT_ENABLED: ${SUPPORT_CHAT_ENABLED:-true}
      SUPPORT_WIDGET_ENABLED: ${SUPPORT_WIDGET_ENABLED:-true}
      SUPPORT_WIDGET_REQUIRE_ORIGIN: ${SUPPORT_WIDGET_REQUIRE_ORIGIN:-true}
      SUPPORT_CALLS_ENABLED: ${SUPPORT_CALLS_ENABLED:-true}
      RUN_MIGRATIONS: "0"
      RUN_COLLECTSTATIC: "0"
    mem_limit: 192m
    cpus: 0.75
    pids_limit: 128
    networks: [messenger]

  beat:
    <<: *backend-common
    command: celery -A config beat -l ${CELERY_LOG_LEVEL:-INFO}
    environment:
      DB_ENGINE: ${DB_ENGINE:-postgres}
      DB_NAME: ${DB_NAME:-messenger_api}
      DB_USER: ${DB_USER:-messenger_user}
      DB_PASSWORD: ${DB_PASSWORD:-messenger_password}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      REDIS_CACHE_URL: ${REDIS_CACHE_URL:-redis://redis:6379/2}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      REALTIME_STREAM_URL: ${REALTIME_STREAM_URL:-redis://redis:6379/3}
      REALTIME_STREAM_NAME: ${REALTIME_STREAM_NAME:-realtime:durable:v1}
      REALTIME_STREAM_GROUP: ${REALTIME_STREAM_GROUP:-axum-single-v1}
      REALTIME_OUTBOX_MAX_AGE_SECONDS: ${REALTIME_OUTBOX_MAX_AGE_SECONDS:-120}
      REALTIME_OUTBOX_MAX_FAILED: ${REALTIME_OUTBOX_MAX_FAILED:-25}
      REALTIME_STREAM_MAX_PENDING: ${REALTIME_STREAM_MAX_PENDING:-250}
      REALTIME_PRESENCE_REDIS_URL: ${REALTIME_PRESENCE_REDIS_URL:-redis://redis:6379/3}
      REALTIME_PRESENCE_TTL_SECONDS: ${REALTIME_PRESENCE_TTL_SECONDS:-90}
      REALTIME_PRESENCE_METADATA_TTL_SECONDS: ${REALTIME_PRESENCE_METADATA_TTL_SECONDS:-300}
      REALTIME_STREAM_ENABLED: ${REALTIME_STREAM_ENABLED:-true}
      REALTIME_OUTBOX_ENABLED: ${REALTIME_OUTBOX_ENABLED:-true}
      REALTIME_TRANSPORT: ${REALTIME_TRANSPORT:-axum}
      REALTIME_AUTH_ENABLED: ${REALTIME_AUTH_ENABLED:-true}
      REALTIME_TOKEN_ALGORITHM: RS256
      REALTIME_TOKEN_ISSUER: ${REALTIME_TOKEN_ISSUER:-crescentsphere-django}
      REALTIME_TICKET_AUDIENCE: ${REALTIME_TICKET_AUDIENCE:-crescentsphere-realtime}
      REALTIME_GRANT_AUDIENCE: ${REALTIME_GRANT_AUDIENCE:-crescentsphere-realtime-grant}
      REALTIME_CALL_GRANT_AUDIENCE: ${REALTIME_CALL_GRANT_AUDIENCE:-crescentsphere-realtime-call-grant}
      REALTIME_TICKET_TTL_SECONDS: ${REALTIME_TICKET_TTL_SECONDS:-45}
      REALTIME_GRANT_TTL_SECONDS: ${REALTIME_GRANT_TTL_SECONDS:-90}
      REALTIME_CALL_GRANT_TTL_SECONDS: ${REALTIME_CALL_GRANT_TTL_SECONDS:-90}
      REALTIME_REQUIRE_ORIGIN: ${REALTIME_REQUIRE_ORIGIN:-true}
      REALTIME_ALLOWED_ORIGINS: ${REALTIME_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      REALTIME_SIGNING_PRIVATE_KEY_PATH: /run/secrets/realtime-private.pem
      REALTIME_SIGNING_PUBLIC_KEY_PATH: /run/secrets/realtime-public.pem
      SUPPORT_CHAT_ENABLED: ${SUPPORT_CHAT_ENABLED:-true}
      SUPPORT_WIDGET_ENABLED: ${SUPPORT_WIDGET_ENABLED:-true}
      SUPPORT_WIDGET_REQUIRE_ORIGIN: ${SUPPORT_WIDGET_REQUIRE_ORIGIN:-true}
      SUPPORT_CALLS_ENABLED: ${SUPPORT_CALLS_ENABLED:-true}
      RUN_MIGRATIONS: "0"
      RUN_COLLECTSTATIC: "0"
    mem_limit: 64m
    cpus: 0.25
    pids_limit: 64
    networks: [messenger]

  realtime:
    init: true
    ulimits:
      nofile:
        soft: 8192
        hard: 8192
    stop_grace_period: 30s
    build:
      context: ./realtime
    restart: unless-stopped
    logging: *default-logging
    environment:
      RUST_LOG: ${REALTIME_RUST_LOG:-crescentsphere_realtime=info,tower_http=info}
      REALTIME_BIND: 0.0.0.0:9000
      REALTIME_STREAM_URL: ${REALTIME_STREAM_URL:-redis://redis:6379/3}
      REALTIME_STREAM_NAME: ${REALTIME_STREAM_NAME:-realtime:durable:v1}
      REALTIME_STREAM_GROUP: ${REALTIME_STREAM_GROUP:-axum-single-v1}
      REALTIME_OUTBOX_MAX_AGE_SECONDS: ${REALTIME_OUTBOX_MAX_AGE_SECONDS:-120}
      REALTIME_OUTBOX_MAX_FAILED: ${REALTIME_OUTBOX_MAX_FAILED:-25}
      REALTIME_STREAM_MAX_PENDING: ${REALTIME_STREAM_MAX_PENDING:-250}
      REALTIME_PRESENCE_REDIS_URL: ${REALTIME_PRESENCE_REDIS_URL:-redis://redis:6379/3}
      REALTIME_PRESENCE_TTL_SECONDS: ${REALTIME_PRESENCE_TTL_SECONDS:-90}
      REALTIME_PRESENCE_METADATA_TTL_SECONDS: ${REALTIME_PRESENCE_METADATA_TTL_SECONDS:-300}
      REALTIME_STREAM_GROUP: ${REALTIME_STREAM_GROUP:-axum-single-v1}
      REALTIME_STREAM_CONSUMER: ${REALTIME_STREAM_CONSUMER:-axum-1}
      REALTIME_AUTH_ENABLED: ${REALTIME_AUTH_ENABLED:-true}
      REALTIME_AUTH_REDIS_URL: ${REALTIME_AUTH_REDIS_URL:-redis://redis:6379/3}
      REALTIME_PRESENCE_DISCONNECT_GRACE_SECONDS: ${REALTIME_PRESENCE_DISCONNECT_GRACE_SECONDS:-12}
      REALTIME_TOKEN_ISSUER: ${REALTIME_TOKEN_ISSUER:-crescentsphere-django}
      REALTIME_TICKET_AUDIENCE: ${REALTIME_TICKET_AUDIENCE:-crescentsphere-realtime}
      REALTIME_GRANT_AUDIENCE: ${REALTIME_GRANT_AUDIENCE:-crescentsphere-realtime-grant}
      REALTIME_CALL_GRANT_AUDIENCE: ${REALTIME_CALL_GRANT_AUDIENCE:-crescentsphere-realtime-call-grant}
      REALTIME_TICKET_REPLAY_PREFIX: ${REALTIME_TICKET_REPLAY_PREFIX:-realtime:ticket-used:}
      REALTIME_AUTH_LEEWAY_SECONDS: ${REALTIME_AUTH_LEEWAY_SECONDS:-5}
      REALTIME_REQUIRE_ORIGIN: ${REALTIME_REQUIRE_ORIGIN:-true}
      REALTIME_ALLOWED_ORIGINS: ${REALTIME_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      REALTIME_SIGNING_PUBLIC_KEY_PATH: /run/secrets/realtime-public.pem
      REALTIME_INTERNAL_TEST_ENABLED: ${REALTIME_INTERNAL_TEST_ENABLED:-false}
      REALTIME_INTERNAL_TEST_TOKEN: ${REALTIME_INTERNAL_TEST_TOKEN:-}
      REALTIME_MAX_CONNECTIONS: ${REALTIME_MAX_CONNECTIONS:-500}
      REALTIME_MAX_USER_CONNECTIONS: ${REALTIME_MAX_USER_CONNECTIONS:-5}
      REALTIME_MAX_WIDGET_CONNECTIONS: ${REALTIME_MAX_WIDGET_CONNECTIONS:-2}
      REALTIME_MAX_DEVICE_CONNECTIONS: ${REALTIME_MAX_DEVICE_CONNECTIONS:-2}
      REALTIME_HIGH_QUEUE_CAPACITY: ${REALTIME_HIGH_QUEUE_CAPACITY:-32}
      REALTIME_LOW_QUEUE_CAPACITY: ${REALTIME_LOW_QUEUE_CAPACITY:-8}
      REALTIME_MAX_MESSAGE_SIZE: ${REALTIME_MAX_MESSAGE_SIZE:-65536}
      REALTIME_MAX_FRAME_SIZE: ${REALTIME_MAX_FRAME_SIZE:-65536}
      REALTIME_HEARTBEAT_SECONDS: ${REALTIME_HEARTBEAT_SECONDS:-25}
      REALTIME_CLIENT_TIMEOUT_SECONDS: ${REALTIME_CLIENT_TIMEOUT_SECONDS:-75}
      REALTIME_MAX_CONNECTION_AGE_SECONDS: ${REALTIME_MAX_CONNECTION_AGE_SECONDS:-600}
      REALTIME_CONNECTION_REFRESH_JITTER_SECONDS: ${REALTIME_CONNECTION_REFRESH_JITTER_SECONDS:-60}
      REALTIME_SEND_TIMEOUT_SECONDS: ${REALTIME_SEND_TIMEOUT_SECONDS:-5}
    volumes:
      - ./secrets:/run/secrets:ro
    expose:
      - "9000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    mem_limit: 192m
    cpus: 1.0
    pids_limit: 128
    networks: [messenger]

  frontend:
    init: true
    stop_grace_period: 30s
    logging: *default-logging
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_AUTH_BASE_URL: ${VITE_AUTH_BASE_URL:-/api/v1}
        VITE_CENTRAL_AUTH_ORIGIN: ${VITE_CENTRAL_AUTH_ORIGIN:-http://localhost:8080}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-}
        VITE_SUPPORT_WS_URL: ${VITE_SUPPORT_WS_URL:-}
        VITE_APP_NAME: ${VITE_APP_NAME:-Crescentsphere Messenger}
        VITE_SOCIAL_BASE_URL: ${VITE_SOCIAL_BASE_URL:-http://localhost:8080}
        VITE_SUPPORT_PLANS_URL: ${VITE_SUPPORT_PLANS_URL:-/support/plans}
    restart: unless-stopped
    mem_limit: 48m
    cpus: 0.25
    pids_limit: 64
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
    networks: [messenger]

  nginx:
    init: true
    ulimits:
      nofile:
        soft: 8192
        hard: 8192
    stop_grace_period: 30s
    image: nginx:1.27-alpine
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 64m
    cpus: 0.25
    pids_limit: 64
    volumes:
      - ${NGINX_CONF_PATH:-./nginx/snm.conf}:/etc/nginx/conf.d/default.conf:ro
      - media:/app/media:ro
    expose:
      - "80"
    depends_on:
      web:
        condition: service_healthy
      frontend:
        condition: service_healthy
      realtime:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --header='X-Forwarded-Proto: https' -q -O /dev/null http://127.0.0.1/api/v1/health/live/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
    networks: [messenger]

volumes:
  postgres_data:
  redis_data:
  private_media:
  media:

networks:
  messenger:
    driver: bridge
