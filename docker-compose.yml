name: cs-messenger

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-backend-common: &backend-common
  build: .
  restart: unless-stopped
  init: true
  stop_grace_period: 30s
  logging: *default-logging
  env_file:
    - path: .env
      required: false
  environment:
    DJANGO_SERVER: ${DJANGO_SERVER:-gunicorn}
    DJANGO_BIND_HOST: ${DJANGO_BIND_HOST:-0.0.0.0}
    DJANGO_PORT: ${DJANGO_PORT:-8000}
    GRANIAN_WORKERS: ${GRANIAN_WORKERS:-1}
    DB_ENGINE: ${DB_ENGINE:-postgres}
    DB_NAME: ${DB_NAME:-messenger_api}
    DB_USER: ${DB_USER:-messenger_user}
    DB_PASSWORD: ${DB_PASSWORD:-messenger_password}
    DB_HOST: postgres
    DB_PORT: 5432
    DATABASE_RUNTIME_ENDPOINT: ${DATABASE_RUNTIME_ENDPOINT:-postgres}
    DATABASE_MAINTENANCE_MODE: ${DATABASE_MAINTENANCE_MODE:-false}
    DB_PGBOUNCER_HOST: ${DB_PGBOUNCER_HOST:-pgbouncer}
    DB_PGBOUNCER_PORT: ${DB_PGBOUNCER_PORT:-6432}
    DB_MIGRATION_HOST: ${DB_MIGRATION_HOST:-postgres}
    DB_MIGRATION_PORT: ${DB_MIGRATION_PORT:-5432}
    DATABASE_CONNECT_TIMEOUT_SECONDS: ${DATABASE_CONNECT_TIMEOUT_SECONDS:-5}
    DATABASE_CONN_MAX_AGE: ${DATABASE_CONN_MAX_AGE:-60}
    REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
    REDIS_CACHE_URL: ${REDIS_CACHE_URL:-redis://redis:6379/2}
    CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
    CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-}
    REALTIME_PRESENCE_REDIS_URL: ${REALTIME_PRESENCE_REDIS_URL:-redis://redis:6379/3}
    REALTIME_PRESENCE_TTL_SECONDS: ${REALTIME_PRESENCE_TTL_SECONDS:-90}
    REALTIME_PRESENCE_METADATA_TTL_SECONDS: ${REALTIME_PRESENCE_METADATA_TTL_SECONDS:-300}
    REALTIME_OUTBOX_ENABLED: ${REALTIME_OUTBOX_ENABLED:-true}
    REALTIME_TRANSPORT: ${REALTIME_TRANSPORT:-axum}
    REALTIME_DURABLE_BACKEND: ${REALTIME_DURABLE_BACKEND:-nats}
    REALTIME_OUTBOX_PUBLISHER: ${REALTIME_OUTBOX_PUBLISHER:-celery}
    REALTIME_EPHEMERAL_BACKEND: ${REALTIME_EPHEMERAL_BACKEND:-local}
    REALTIME_PRESENCE_BACKEND: ${REALTIME_PRESENCE_BACKEND:-legacy_redis}
    CHAT_COMMAND_BACKEND: ${CHAT_COMMAND_BACKEND:-django}
    CHAT_INTERACTION_BACKEND: ${CHAT_INTERACTION_BACKEND:-django}
    CHAT_MESSAGE_MUTATION_BACKEND: ${CHAT_MESSAGE_MUTATION_BACKEND:-django}
    CHAT_CALL_RUNTIME_BACKEND: ${CHAT_CALL_RUNTIME_BACKEND:-django}
    CHAT_ATTACHMENT_BACKEND: ${CHAT_ATTACHMENT_BACKEND:-django}
    CHAT_CONVERSATION_COMMAND_BACKEND: ${CHAT_CONVERSATION_COMMAND_BACKEND:-django}
    CENTRAL_PAYMENTS_ENABLED: ${CENTRAL_PAYMENTS_ENABLED:-true}
    AXUM_DATA_PLANE_REQUIRED: ${AXUM_DATA_PLANE_REQUIRED:-false}
    MEDIA_PROCESSING_BACKEND: ${MEDIA_PROCESSING_BACKEND:-django}
    MEDIA_TOKEN_SHARED_SECRET: ${MEDIA_TOKEN_SHARED_SECRET:-}
    MEDIA_TOKEN_ISSUER: ${MEDIA_TOKEN_ISSUER:-crescentsphere-media}
    MEDIA_TOKEN_AUDIENCE: ${MEDIA_TOKEN_AUDIENCE:-crescentsphere-private-media}
    CHAT_COMMAND_JWT_ISSUER: ${CHAT_COMMAND_JWT_ISSUER:-${AUTH_PAYMENT_JWT_ISSUER:-crescentsphere-django}}
    CHAT_COMMAND_JWT_AUDIENCE: ${CHAT_COMMAND_JWT_AUDIENCE:-}
    CHAT_READ_BACKEND: ${CHAT_READ_BACKEND:-django}
    SQLX_DATABASE_URL: ${SQLX_DATABASE_URL:-postgres://${DB_USER:-messenger_user}:${DB_PASSWORD:-messenger_password}@pgbouncer:6432/${DB_NAME:-messenger_api}}
    SQLX_MIN_CONNECTIONS: ${SQLX_MIN_CONNECTIONS:-1}
    SQLX_MAX_CONNECTIONS: ${SQLX_MAX_CONNECTIONS:-4}
    SQLX_ACQUIRE_TIMEOUT_MS: ${SQLX_ACQUIRE_TIMEOUT_MS:-1500}
    SQLX_IDLE_TIMEOUT_SECONDS: ${SQLX_IDLE_TIMEOUT_SECONDS:-60}
    SQLX_MAX_LIFETIME_SECONDS: ${SQLX_MAX_LIFETIME_SECONDS:-900}
    NATS_URL: ${NATS_APP_URL:-nats://${NATS_APP_USER:-django}:${NATS_APP_PASSWORD:-change-me-nats-app}@nats:4222}
    NATS_CONNECT_TIMEOUT_SECONDS: ${NATS_CONNECT_TIMEOUT_SECONDS:-3}
    NATS_CHAT_STREAM: ${NATS_CHAT_STREAM:-CHAT_EVENTS}
    REALTIME_AUTH_ENABLED: ${REALTIME_AUTH_ENABLED:-true}
    REALTIME_TOKEN_ALGORITHM: RS256
    REALTIME_TOKEN_ISSUER: ${REALTIME_TOKEN_ISSUER:-crescentsphere-django}
    REALTIME_TICKET_AUDIENCE: ${REALTIME_TICKET_AUDIENCE:-crescentsphere-realtime}
    REALTIME_GRANT_AUDIENCE: ${REALTIME_GRANT_AUDIENCE:-crescentsphere-realtime-grant}
    REALTIME_CALL_GRANT_AUDIENCE: ${REALTIME_CALL_GRANT_AUDIENCE:-crescentsphere-realtime-call-grant}
    REALTIME_TICKET_TTL_SECONDS: ${REALTIME_TICKET_TTL_SECONDS:-45}
    REALTIME_GRANT_TTL_SECONDS: ${REALTIME_GRANT_TTL_SECONDS:-90}
    REALTIME_CALL_GRANT_TTL_SECONDS: ${REALTIME_CALL_GRANT_TTL_SECONDS:-90}
    REALTIME_REQUIRE_ORIGIN: ${REALTIME_REQUIRE_ORIGIN:-true}
    REALTIME_ALLOWED_ORIGINS: ${REALTIME_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
    REALTIME_SIGNING_PRIVATE_KEY_PATH: /run/secrets/realtime-private.pem
    REALTIME_SIGNING_PUBLIC_KEY_PATH: /run/secrets/realtime-public.pem
    ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web,nginx}
    CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
    CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
    FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:8080}
    SITE_URL: ${SITE_URL:-http://localhost:8080}
    SUPPORT_CHAT_ENABLED: ${SUPPORT_CHAT_ENABLED:-true}
    SUPPORT_CHAT_PRODUCT_CODE: ${SUPPORT_CHAT_PRODUCT_CODE:-support-chat}
    SUPPORT_WIDGET_ENABLED: ${SUPPORT_WIDGET_ENABLED:-true}
    SUPPORT_WIDGET_REQUIRE_ORIGIN: ${SUPPORT_WIDGET_REQUIRE_ORIGIN:-true}
    SUPPORT_CALLS_ENABLED: ${SUPPORT_CALLS_ENABLED:-true}
  volumes:
    - private_media:/app/private_media
    - media:/app/media
    - ./secrets:/run/secrets:ro
  depends_on:
    postgres:
      condition: service_healthy
    pgbouncer:
      condition: service_healthy
    redis:
      condition: service_healthy
    nats:
      condition: service_healthy

services:
  postgres:
    init: true
    stop_grace_period: 30s
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    command:
      - postgres
      - -c
      - max_connections=30
      - -c
      - shared_buffers=128MB
      - -c
      - work_mem=2MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - idle_in_transaction_session_timeout=60s
      - -c
      - log_min_duration_statement=500
    mem_limit: 320m
    cpus: 1.10
    pids_limit: 128
    environment:
      POSTGRES_DB: ${DB_NAME:-messenger_api}
      POSTGRES_USER: ${DB_USER:-messenger_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-messenger_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-messenger_user} -d ${DB_NAME:-messenger_api}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [messenger]

  pgbouncer:
    init: true
    stop_grace_period: 20s
    build:
      context: ./deploy/pgbouncer
    restart: unless-stopped
    logging: *default-logging
    environment:
      DB_NAME: ${DB_NAME:-messenger_api}
      DB_USER: ${DB_USER:-messenger_user}
      DB_PASSWORD: ${DB_PASSWORD:-messenger_password}
      DB_HOST: postgres
      DB_PORT: 5432
      PGBOUNCER_POOL_MODE: ${PGBOUNCER_POOL_MODE:-transaction}
      PGBOUNCER_DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-10}
      PGBOUNCER_RESERVE_POOL_SIZE: ${PGBOUNCER_RESERVE_POOL_SIZE:-2}
      PGBOUNCER_MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-100}
      PGBOUNCER_SERVER_IDLE_TIMEOUT: ${PGBOUNCER_SERVER_IDLE_TIMEOUT:-60}
      PGBOUNCER_QUERY_TIMEOUT: ${PGBOUNCER_QUERY_TIMEOUT:-30}
      PGBOUNCER_CLIENT_IDLE_TIMEOUT: ${PGBOUNCER_CLIENT_IDLE_TIMEOUT:-300}
    expose:
      - "6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=$${DB_PASSWORD} pg_isready -h 127.0.0.1 -p 6432 -U $${DB_USER} -d $${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    mem_limit: 24m
    cpus: 0.15
    pids_limit: 64
    networks: [messenger]

  redis:
    init: true
    stop_grace_period: 30s
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - ""
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - noeviction
      - --latency-monitor-threshold
      - "100"
      - --slowlog-log-slower-than
      - "10000"
      - --slowlog-max-len
      - "128"
    mem_limit: 160m
    cpus: 0.50
    pids_limit: 96
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [messenger]

  nats:
    init: true
    stop_grace_period: 20s
    image: nats:2.14.3-alpine
    restart: unless-stopped
    logging: *default-logging
    entrypoint: ["/bin/sh", "/etc/nats/render-config.sh"]
    environment:
      GOMEMLIMIT: 96MiB
      NATS_APP_USER: ${NATS_APP_USER:-django}
      NATS_APP_PASSWORD: ${NATS_APP_PASSWORD:-change-me-nats-app}
      NATS_REALTIME_USER: ${NATS_REALTIME_USER:-realtime}
      NATS_REALTIME_PASSWORD: ${NATS_REALTIME_PASSWORD:-change-me-nats-realtime}
    volumes:
      - ./deploy/nats/nats.conf:/etc/nats/nats.conf.template:ro
      - ./deploy/nats/render-config.sh:/etc/nats/render-config.sh:ro
      - nats_data:/data
    expose:
      - "4222"
      - "8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null 'http://127.0.0.1:8222/healthz?js-enabled-only=true' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    mem_limit: 128m
    cpus: 0.35
    pids_limit: 96
    networks: [messenger]

  web:
    <<: *backend-common
    ulimits:
      nofile:
        soft: 4096
        hard: 4096
    command: ["/app/deploy/django/start-server.sh"]
    environment:
      DB_ENGINE: ${DB_ENGINE:-postgres}
      DB_NAME: ${DB_NAME:-messenger_api}
      DB_USER: ${DB_USER:-messenger_user}
      DB_PASSWORD: ${DB_PASSWORD:-messenger_password}
      DB_HOST: postgres
      DB_PORT: 5432
      DATABASE_RUNTIME_ENDPOINT: ${DATABASE_RUNTIME_ENDPOINT:-postgres}
      DB_PGBOUNCER_HOST: ${DB_PGBOUNCER_HOST:-pgbouncer}
      DB_PGBOUNCER_PORT: ${DB_PGBOUNCER_PORT:-6432}
      DB_MIGRATION_HOST: ${DB_MIGRATION_HOST:-postgres}
      DB_MIGRATION_PORT: ${DB_MIGRATION_PORT:-5432}
      DATABASE_CONNECT_TIMEOUT_SECONDS: ${DATABASE_CONNECT_TIMEOUT_SECONDS:-5}
      DATABASE_CONN_MAX_AGE: ${DATABASE_CONN_MAX_AGE:-60}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      REDIS_CACHE_URL: ${REDIS_CACHE_URL:-redis://redis:6379/2}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-}
      NATS_URL: ${NATS_APP_URL:-nats://${NATS_APP_USER:-django}:${NATS_APP_PASSWORD:-change-me-nats-app}@nats:4222}
      REALTIME_OUTBOX_MAX_AGE_SECONDS: ${REALTIME_OUTBOX_MAX_AGE_SECONDS:-120}
      REALTIME_OUTBOX_MAX_FAILED: ${REALTIME_OUTBOX_MAX_FAILED:-25}
      REALTIME_PRESENCE_REDIS_URL: ${REALTIME_PRESENCE_REDIS_URL:-redis://redis:6379/3}
      REALTIME_PRESENCE_TTL_SECONDS: ${REALTIME_PRESENCE_TTL_SECONDS:-90}
      REALTIME_PRESENCE_METADATA_TTL_SECONDS: ${REALTIME_PRESENCE_METADATA_TTL_SECONDS:-300}
      REALTIME_OUTBOX_ENABLED: ${REALTIME_OUTBOX_ENABLED:-true}
      REALTIME_TRANSPORT: ${REALTIME_TRANSPORT:-axum}
      REALTIME_DURABLE_BACKEND: ${REALTIME_DURABLE_BACKEND:-nats}
      REALTIME_OUTBOX_PUBLISHER: ${REALTIME_OUTBOX_PUBLISHER:-celery}
      REALTIME_EPHEMERAL_BACKEND: ${REALTIME_EPHEMERAL_BACKEND:-local}
      REALTIME_PRESENCE_BACKEND: ${REALTIME_PRESENCE_BACKEND:-legacy_redis}
      CHAT_COMMAND_BACKEND: ${CHAT_COMMAND_BACKEND:-django}
      CHAT_INTERACTION_BACKEND: ${CHAT_INTERACTION_BACKEND:-django}
      CHAT_MESSAGE_MUTATION_BACKEND: ${CHAT_MESSAGE_MUTATION_BACKEND:-django}
      CHAT_CALL_RUNTIME_BACKEND: ${CHAT_CALL_RUNTIME_BACKEND:-django}
      CHAT_ATTACHMENT_BACKEND: ${CHAT_ATTACHMENT_BACKEND:-django}
      CHAT_CONVERSATION_COMMAND_BACKEND: ${CHAT_CONVERSATION_COMMAND_BACKEND:-django}
      SUPPORT_DATA_BACKEND: ${SUPPORT_DATA_BACKEND:-django}
      SUPPORT_SIGNAL_QUEUE_CAPACITY: ${SUPPORT_SIGNAL_QUEUE_CAPACITY:-256}
      SUPPORT_SIGNAL_QUEUE_TTL_SECONDS: ${SUPPORT_SIGNAL_QUEUE_TTL_SECONDS:-180}
      CENTRAL_PAYMENTS_ENABLED: ${CENTRAL_PAYMENTS_ENABLED:-true}
      MEDIA_TOKEN_SHARED_SECRET: ${MEDIA_TOKEN_SHARED_SECRET:-}
      MEDIA_TOKEN_ISSUER: ${MEDIA_TOKEN_ISSUER:-crescentsphere-media}
      MEDIA_TOKEN_AUDIENCE: ${MEDIA_TOKEN_AUDIENCE:-crescentsphere-private-media}
      CHAT_COMMAND_JWT_ISSUER: ${CHAT_COMMAND_JWT_ISSUER:-${AUTH_PAYMENT_JWT_ISSUER:-crescentsphere-django}}
      CHAT_COMMAND_JWT_AUDIENCE: ${CHAT_COMMAND_JWT_AUDIENCE:-}
      CHAT_READ_BACKEND: ${CHAT_READ_BACKEND:-django}
      SQLX_DATABASE_URL: ${SQLX_DATABASE_URL:-postgres://${DB_USER:-messenger_user}:${DB_PASSWORD:-messenger_password}@pgbouncer:6432/${DB_NAME:-messenger_api}}
      SQLX_MIN_CONNECTIONS: ${SQLX_MIN_CONNECTIONS:-1}
      SQLX_MAX_CONNECTIONS: ${SQLX_MAX_CONNECTIONS:-4}
      SQLX_ACQUIRE_TIMEOUT_MS: ${SQLX_ACQUIRE_TIMEOUT_MS:-1500}
      SQLX_IDLE_TIMEOUT_SECONDS: ${SQLX_IDLE_TIMEOUT_SECONDS:-60}
      SQLX_MAX_LIFETIME_SECONDS: ${SQLX_MAX_LIFETIME_SECONDS:-900}
      REALTIME_HTTP_READ_CONCURRENCY: ${REALTIME_HTTP_READ_CONCURRENCY:-24}
      REALTIME_HTTP_WRITE_CONCURRENCY: ${REALTIME_HTTP_WRITE_CONCURRENCY:-12}
      REALTIME_HTTP_REQUEST_TIMEOUT_MS: ${REALTIME_HTTP_REQUEST_TIMEOUT_MS:-10000}
      REALTIME_HTTP_MAX_BODY_BYTES: ${REALTIME_HTTP_MAX_BODY_BYTES:-1048576}
      MESSAGE_EDIT_WINDOW_SECONDS: ${MESSAGE_EDIT_WINDOW_SECONDS:-900}
      CALL_SIGNAL_QUEUE_CAPACITY: ${CALL_SIGNAL_QUEUE_CAPACITY:-256}
      CALL_SIGNAL_QUEUE_TTL_SECONDS: ${CALL_SIGNAL_QUEUE_TTL_SECONDS:-180}
      CALL_RECONNECT_GRACE_SECONDS: ${CALL_RECONNECT_GRACE_SECONDS:-20}
      CALL_STALE_PARTICIPANT_SECONDS: ${CALL_STALE_PARTICIPANT_SECONDS:-35}
      CALL_SPEAKER_LEVEL_THRESHOLD: ${CALL_SPEAKER_LEVEL_THRESHOLD:-35}
      CALL_GRID_LAYOUT_THRESHOLD: ${CALL_GRID_LAYOUT_THRESHOLD:-4}
      REALTIME_AUTH_ENABLED: ${REALTIME_AUTH_ENABLED:-true}
      REALTIME_TOKEN_ALGORITHM: RS256
      REALTIME_TOKEN_ISSUER: ${REALTIME_TOKEN_ISSUER:-crescentsphere-django}
      REALTIME_TICKET_AUDIENCE: ${REALTIME_TICKET_AUDIENCE:-crescentsphere-realtime}
      REALTIME_GRANT_AUDIENCE: ${REALTIME_GRANT_AUDIENCE:-crescentsphere-realtime-grant}
      REALTIME_CALL_GRANT_AUDIENCE: ${REALTIME_CALL_GRANT_AUDIENCE:-crescentsphere-realtime-call-grant}
      REALTIME_TICKET_TTL_SECONDS: ${REALTIME_TICKET_TTL_SECONDS:-45}
      REALTIME_GRANT_TTL_SECONDS: ${REALTIME_GRANT_TTL_SECONDS:-90}
      REALTIME_CALL_GRANT_TTL_SECONDS: ${REALTIME_CALL_GRANT_TTL_SECONDS:-90}
      REALTIME_REQUIRE_ORIGIN: ${REALTIME_REQUIRE_ORIGIN:-true}
      REALTIME_ALLOWED_ORIGINS: ${REALTIME_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      REALTIME_SIGNING_PRIVATE_KEY_PATH: /run/secrets/realtime-private.pem
      REALTIME_SIGNING_PUBLIC_KEY_PATH: /run/secrets/realtime-public.pem
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web,nginx}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:8080}
      SITE_URL: ${SITE_URL:-http://localhost:8080}
      BACKUP_R2_BUCKET_NAME: ${BACKUP_R2_BUCKET_NAME:-}
      BACKUP_R2_PREFIX: ${BACKUP_R2_PREFIX:-system-backups}
      BACKUP_R2_RETENTION_DAYS: ${BACKUP_R2_RETENTION_DAYS:-30}
      BACKUP_R2_KEEP_LATEST: ${BACKUP_R2_KEEP_LATEST:-7}
      BACKUP_MAX_UPLOAD_BYTES: ${BACKUP_MAX_UPLOAD_BYTES:-2147483648}
      SUPPORT_CHAT_ENABLED: ${SUPPORT_CHAT_ENABLED:-true}
      SUPPORT_CHAT_PRODUCT_CODE: ${SUPPORT_CHAT_PRODUCT_CODE:-support-chat}
      SUPPORT_WIDGET_ENABLED: ${SUPPORT_WIDGET_ENABLED:-true}
      SUPPORT_WIDGET_REQUIRE_ORIGIN: ${SUPPORT_WIDGET_REQUIRE_ORIGIN:-true}
      SUPPORT_CALLS_ENABLED: ${SUPPORT_CALLS_ENABLED:-true}
      # The web process is the single migration owner. Do not allow a stale
      # host .env value to start new application code against an old schema.
      RUN_MIGRATIONS: "1"
      RUN_COLLECTSTATIC: "1"
      ENSURE_NATS_STREAM: "1"
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - -H
        - "Host: ${APP_DOMAIN:-localhost}"
        - -H
        - "X-Forwarded-Proto: https"
        - http://127.0.0.1:8000/api/v1/health/live/
      interval: 20s
      timeout: 8s
      retries: 10
      start_period: 30s
    mem_limit: 256m
    cpus: 0.75
    pids_limit: 128
    networks: [messenger]

  worker:
    <<: *backend-common
    command: celery -A config worker -l ${CELERY_LOG_LEVEL:-INFO} --concurrency=${CELERY_WORKER_CONCURRENCY:-1} --prefetch-multiplier=${CELERY_WORKER_PREFETCH_MULTIPLIER:-1} --max-tasks-per-child=${CELERY_WORKER_MAX_TASKS_PER_CHILD:-500}
    environment:
      DB_ENGINE: ${DB_ENGINE:-postgres}
      DB_NAME: ${DB_NAME:-messenger_api}
      DB_USER: ${DB_USER:-messenger_user}
      DB_PASSWORD: ${DB_PASSWORD:-messenger_password}
      DB_HOST: postgres
      DB_PORT: 5432
      DATABASE_RUNTIME_ENDPOINT: ${DATABASE_RUNTIME_ENDPOINT:-postgres}
      DB_PGBOUNCER_HOST: ${DB_PGBOUNCER_HOST:-pgbouncer}
      DB_PGBOUNCER_PORT: ${DB_PGBOUNCER_PORT:-6432}
      DB_MIGRATION_HOST: ${DB_MIGRATION_HOST:-postgres}
      DB_MIGRATION_PORT: ${DB_MIGRATION_PORT:-5432}
      DATABASE_CONNECT_TIMEOUT_SECONDS: ${DATABASE_CONNECT_TIMEOUT_SECONDS:-5}
      DATABASE_CONN_MAX_AGE: ${DATABASE_CONN_MAX_AGE:-60}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      REDIS_CACHE_URL: ${REDIS_CACHE_URL:-redis://redis:6379/2}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-}
      NATS_URL: ${NATS_APP_URL:-nats://${NATS_APP_USER:-django}:${NATS_APP_PASSWORD:-change-me-nats-app}@nats:4222}
      REALTIME_OUTBOX_MAX_AGE_SECONDS: ${REALTIME_OUTBOX_MAX_AGE_SECONDS:-120}
      REALTIME_OUTBOX_MAX_FAILED: ${REALTIME_OUTBOX_MAX_FAILED:-25}
      REALTIME_PRESENCE_REDIS_URL: ${REALTIME_PRESENCE_REDIS_URL:-redis://redis:6379/3}
      REALTIME_PRESENCE_TTL_SECONDS: ${REALTIME_PRESENCE_TTL_SECONDS:-90}
      REALTIME_PRESENCE_METADATA_TTL_SECONDS: ${REALTIME_PRESENCE_METADATA_TTL_SECONDS:-300}
      REALTIME_OUTBOX_ENABLED: ${REALTIME_OUTBOX_ENABLED:-true}
      REALTIME_TRANSPORT: ${REALTIME_TRANSPORT:-axum}
      REALTIME_DURABLE_BACKEND: ${REALTIME_DURABLE_BACKEND:-nats}
      REALTIME_OUTBOX_PUBLISHER: ${REALTIME_OUTBOX_PUBLISHER:-celery}
      REALTIME_EPHEMERAL_BACKEND: ${REALTIME_EPHEMERAL_BACKEND:-local}
      REALTIME_PRESENCE_BACKEND: ${REALTIME_PRESENCE_BACKEND:-legacy_redis}
      CHAT_COMMAND_BACKEND: ${CHAT_COMMAND_BACKEND:-django}
