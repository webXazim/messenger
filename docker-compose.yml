      MEDIA_WORKER_LOCAL_STORAGE_ROOT: /app/private_media
      MEDIA_WORKER_STORAGE_PREFIX: ${MEDIA_WORKER_STORAGE_PREFIX:-chat-private}
      MEDIA_SERVER_THUMBNAIL_DIMENSION: ${MEDIA_SERVER_THUMBNAIL_DIMENSION:-960}
      MEDIA_SERVER_THUMBNAIL_JPEG_QUALITY: ${MEDIA_SERVER_THUMBNAIL_JPEG_QUALITY:-82}
      MEDIA_VIDEO_THUMBNAIL_OFFSET_SECONDS: ${MEDIA_VIDEO_THUMBNAIL_OFFSET_SECONDS:-0.25}
      CHAT_USE_R2_STORAGE: ${CHAT_USE_R2_STORAGE:-False}
      CLOUDFLARE_R2_ACCOUNT_ID: ${CLOUDFLARE_R2_ACCOUNT_ID:-}
      CLOUDFLARE_R2_BUCKET_NAME: ${CLOUDFLARE_R2_BUCKET_NAME:-}
      CLOUDFLARE_R2_ACCESS_KEY_ID: ${CLOUDFLARE_R2_ACCESS_KEY_ID:-}
      CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${CLOUDFLARE_R2_SECRET_ACCESS_KEY:-}
      CLOUDFLARE_R2_ENDPOINT_URL: ${CLOUDFLARE_R2_ENDPOINT_URL:-}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-auto}
    volumes:
      - private_media:/app/private_media
      - media_worker_tmp:/work
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/media-worker", "--healthcheck"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s
    mem_limit: 256m
    cpus: 0.75
    pids_limit: 96
    networks: [messenger]

  frontend:
    init: true
    stop_grace_period: 30s
    logging: *default-logging
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_CHAT_COMMAND_BACKEND: ${VITE_CHAT_COMMAND_BACKEND:-django}
        VITE_CHAT_INTERACTION_BACKEND: ${VITE_CHAT_INTERACTION_BACKEND:-django}
        VITE_CHAT_MESSAGE_MUTATION_BACKEND: ${VITE_CHAT_MESSAGE_MUTATION_BACKEND:-django}
        VITE_CHAT_CALL_RUNTIME_BACKEND: ${VITE_CHAT_CALL_RUNTIME_BACKEND:-django}
        VITE_CHAT_ATTACHMENT_BACKEND: ${VITE_CHAT_ATTACHMENT_BACKEND:-django}
        VITE_CHAT_CONVERSATION_COMMAND_BACKEND: ${VITE_CHAT_CONVERSATION_COMMAND_BACKEND:-django}
        VITE_CHAT_READ_BACKEND: ${VITE_CHAT_READ_BACKEND:-django}
        VITE_SUPPORT_DATA_BACKEND: ${VITE_SUPPORT_DATA_BACKEND:-django}
        VITE_AUTH_BASE_URL: ${VITE_AUTH_BASE_URL:-/api/v1}
        VITE_CENTRAL_AUTH_ORIGIN: ${VITE_CENTRAL_AUTH_ORIGIN:-http://localhost:8080}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-}
        VITE_SUPPORT_WS_URL: ${VITE_SUPPORT_WS_URL:-}
        VITE_APP_NAME: ${VITE_APP_NAME:-Crescentsphere Messenger}
        VITE_SOCIAL_BASE_URL: ${VITE_SOCIAL_BASE_URL:-http://localhost:8080}
        VITE_SUPPORT_PLANS_URL: ${VITE_SUPPORT_PLANS_URL:-/support/plans}
    restart: unless-stopped
    mem_limit: 32m
    cpus: 0.15
    pids_limit: 64
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
    networks: [messenger]

  nginx:
    init: true
    ulimits:
      nofile:
        soft: 8192
        hard: 8192
    stop_grace_period: 30s
    image: nginx:1.30.4-alpine
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 48m
    cpus: 0.20
    pids_limit: 64
    volumes:
      - ${NGINX_CONF_PATH:-./nginx/snm.conf}:/etc/nginx/conf.d/default.conf:ro
      - media:/app/media:ro
    expose:
      - "80"
    depends_on:
      web:
        condition: service_healthy
      frontend:
        condition: service_healthy
      realtime:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --header='X-Forwarded-Proto: https' -q -O /dev/null http://127.0.0.1/api/v1/health/live/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
    networks: [messenger]

volumes:
  postgres_data:
  redis_data:
  nats_data:
  private_media:
  media:
  media_worker_tmp:

networks:
  messenger:
    driver: bridge
