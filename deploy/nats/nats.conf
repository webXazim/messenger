server_name: messenger-nats-01
port: 4222
http: 8222

max_payload: 256KB
max_pending: 8MB
max_subscriptions: 4096
max_connections: 256
write_deadline: "5s"

authorization {
  users: [
    { user: $NATS_APP_USER, password: $NATS_APP_PASSWORD,
      permissions: {
        publish: ["event.chat.>", "$JS.API.>"],
        subscribe: ["_INBOX.>"]
      } }
    { user: $NATS_REALTIME_USER, password: $NATS_REALTIME_PASSWORD,
      permissions: {
        publish: ["$JS.API.>", "$JS.ACK.>", "_INBOX.>", "rt.>"],
        subscribe: ["event.chat.>", "_INBOX.>", "rt.>"]
      } }
  ]
}

jetstream {
  store_dir: "/data/jetstream"
  max_memory_store: 32MB
  max_file_store: 2GB
}
